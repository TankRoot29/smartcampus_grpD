version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_storage
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=junior
      - DOCKER_INFLUXDB_INIT_PASSWORD=MonMotDePasseSecurise123
      - DOCKER_INFLUXDB_INIT_ORG=ufhb
      - DOCKER_INFLUXDB_INIT_BUCKET=parking_metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=MonSuperTokenSecretEtTresLongPourLAPI123456789

  mqtt_exporter:
    build: ./mqtt_exporter
    container_name: mqtt_to_influx
    restart: always
    depends_on:
      - influxdb
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=MonSuperTokenSecretEtTresLongPourLAPI123456789
      - INFLUXDB_ORG=ufhb
      - INFLUXDB_BUCKET=parking_metrics

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_viz
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  influxdb_data:
  grafana_data: